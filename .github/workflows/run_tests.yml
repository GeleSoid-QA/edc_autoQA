name: Run autotests

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: select test to run
        required: true
        type: choice
        default: all
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest
    name: tests
    steps:
      - name: copy source port
        uses: actions/checkout@v4
      - name: set up python env
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: instal dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -v
        
